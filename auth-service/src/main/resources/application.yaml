spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

jwt:
  secret: mySuperSecretKeyForCodingJudgePlatform2026MySuperSecretKey

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
